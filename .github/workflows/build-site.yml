name: Build single-file site

# Pages 走「从分支根目录」发布 → 每次推送自动重建根目录的自包含 index.html。
# paths-ignore index.html 防止自提交触发死循环。
on:
  push:
    branches: [main]
    paths-ignore: ['index.html']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cp dist/web/index.html index.html
      # 美术素材: public/assets 同步到根 assets/ (Pages 从根目录发布, 运行期 Assets.load 取用)
      - run: |
          if [ -d public/assets ]; then
            mkdir -p assets
            rsync -a --delete --exclude 'README.txt' public/assets/ assets/
          fi
      - name: Commit rebuilt single-file index.html + assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets 2>/dev/null || git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild single-file index.html + sync assets [skip ci]"
            git push
          else
            echo "nothing changed"
          fi
